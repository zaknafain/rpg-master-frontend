<h2 mat-dialog-title>Development log</h2>
<mat-dialog-content>
  <mat-list>
    <mat-list-item *ngFor='let message of data.messages.slice(-10)'> {{message}} </mat-list-item>
  </mat-list>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>close</button>
</mat-dialog-actions>
