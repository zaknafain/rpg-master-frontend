<ng-container>
  <mat-toolbar class="toolbar-header">
    <span>RPGMaster</span>
    <span *ngIf="currentUser">{{currentUser.name}}</span>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" opened="true" disableClose="false" fixedInViewport="false">
      <mat-nav-list *ngIf="currentUser">
        <a mat-list-item href="...">Public Campaigns</a>
        <a mat-list-item href="...">Private Campaigns</a>
        <a mat-list-item href="...">Favorites</a>
     </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <div *ngIf="jwtToken; else notSignedIn">Hello World</div>
      <ng-template #notSignedIn>
        <sign-in (signedIn)="assignCurrentUser($event)"></sign-in>
      </ng-template>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <mat-toolbar class="toolbar-footer">
    <button mat-icon-button [disabled]="messageService.messages.length == 0" (click)="openLogDialog()">
      Development log
    </button>
  </mat-toolbar>
</ng-container>
