<ng-container>
  <mat-toolbar class="toolbar-header">
    <span>RPGMaster</span>
    <mat-icon>language</mat-icon>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" opened="true" disableClose="false" fixedInViewport="false">
      Menu
    </mat-sidenav>
    <mat-sidenav-content>
      <div *ngIf="current_user; else notSignedIn" class="main-area">Hello World</div>
      <ng-template #notSignedIn>
        <sign-in ></sign-in>
      </ng-template>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <mat-toolbar class="toolbar-footer">Footer</mat-toolbar>
</ng-container>
