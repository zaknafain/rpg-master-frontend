<ng-container>
  <mat-toolbar class="toolbar-header">
    <span>RPGMaster</span>
    <span *ngIf="currentUser">{{currentUser.name}}</span>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" opened="true" disableClose="false" fixedInViewport="false">
      Menu
    </mat-sidenav>
    <mat-sidenav-content>
      <div *ngIf="currentUser; else notSignedIn">Hello World</div>
      <ng-template #notSignedIn>
        <sign-in signIn="currentUser" (signedIn)="assignCurrentUser($event)"></sign-in>
      </ng-template>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <mat-toolbar class="toolbar-footer">Footer</mat-toolbar>
</ng-container>
