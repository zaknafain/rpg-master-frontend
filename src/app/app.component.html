<header>
  <mat-toolbar color="primary">
    <mat-toolbar-row>
      <span routerLink="/" class="toolbar-brand" [ngClass]="{'mobile-signed-id' : mobileQuery.matches && currentUser}">RPGMaster</span>

      <button mat-icon-button *ngIf="!currentUser" routerLink="/sign_in"><mat-icon>exit_to_app</mat-icon></button>
      <ng-container *ngIf="currentUser">
        <button mat-icon-button [matMenuTriggerFor]="profileMenu"><mat-icon>more_horiz</mat-icon></button>
        <mat-menu #profileMenu="matMenu">
          <button mat-menu-item routerLink="/settings" routerLinkActive="active">
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
          <button mat-menu-item disabled>
            <mat-icon>language</mat-icon>
            <span>Language</span>
          </button>
          <button mat-menu-item (click)="signOut()">
            <mat-icon>power_settings_new</mat-icon>
            <span>Log out</span>
          </button>
        </mat-menu>
      </ng-container>
    </mat-toolbar-row>
  </mat-toolbar>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer>
  <mat-toolbar color="primary" class="toolbar-footer"></mat-toolbar>
</footer>
