<mat-list>
  <h3 mat-subheader>Identity</h3>
  <mat-list-item>
    <mat-icon mat-list-icon>account_circle</mat-icon>
    <h4 mat-line>Username</h4>
    <p mat-line>{{ currentUser.name }}</p>
    <button mat-icon-button type="button" routerLink="identity">
      <mat-icon>edit</mat-icon>
    </button>
  </mat-list-item>
  <mat-list-item>
    <mat-icon mat-list-icon>email</mat-icon>
    <h4 mat-line>Email</h4>
    <p mat-line>{{ currentUser.email }}</p>
    <button mat-icon-button type="button" routerLink="identity">
      <mat-icon>edit</mat-icon>
    </button>
  </mat-list-item>
  <h3 mat-subheader>Security</h3>
  <mat-list-item>
    <mat-icon mat-list-icon>security</mat-icon>
    <h4 mat-line>Password</h4>
    <p mat-line>****</p>
    <mat-icon>edit</mat-icon>
  </mat-list-item>
  <h3 mat-subheader>Info</h3>
  <mat-list-item>
    <mat-icon mat-list-icon>history</mat-icon>
    <h4 mat-line>Account created at</h4>
    <p mat-line>{{ currentUser.createdAt | date:'medium' }}</p>
  </mat-list-item>
</mat-list>
